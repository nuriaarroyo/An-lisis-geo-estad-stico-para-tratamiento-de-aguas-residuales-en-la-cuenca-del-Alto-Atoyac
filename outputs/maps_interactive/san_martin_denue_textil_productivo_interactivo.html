    <b>CLEE:</b> ${p.clee}
  `;
  L.circleMarker([p.lat, p.lon], {
    radius: 5,
    color: '#ffffff',
    weight: 1,
    fillColor: color,
    fillOpacity: 0.88
  }).bindPopup(popup).addTo(pointLayer);
});

L.control.layers(null, {
  'Cauces / hidrografia': hydroLayer,
  'DENUE textil productivo': pointLayer
}, { collapsed: false }).addTo(map);

const legend = L.control({position: 'bottomright'});
legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<b>San Martin Texmelucan: DENUE textil productivo</b><br>' +
    Object.entries(colors).map(([k, v]) => `<div><span class="swatch" style="background:${v}"></span>${k}</div>`).join('');
  return div;
};
legend.addTo(map);

if (points.length > 0) {
  const bounds = L.latLngBounds(points.map(p => [p.lat, p.lon]));
  map.fitBounds(bounds.pad(0.18));
}
</script>
</body>
</html>
